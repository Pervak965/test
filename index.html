<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>One Message</title>
  <style>
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: Arial;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 80px;
    }

    textarea {
      width: 300px;
      height: 120px;
      background: #1c1c1c;
      color: white;
      border: 1px solid #333;
      padding: 10px;
      border-radius: 8px;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #3a3a3a;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #timer {
      margin-top: 15px;
      color: #aaa;
    }

    .msg {
      margin-top: 40px;
      width: 300px;
      padding: 10px;
      border-bottom: 1px solid #333;
    }
  </style>
</head>
<body>

  <h1>1 message every 30 minutes</h1>

  <textarea id="text"></textarea>
  <button id="sendBtn" onclick="sendMessage()">Send</button>

  <div id="timer"></div>

  <div id="messages"></div>

<script>
const API = "https://YOUR-WORKER.workers.dev"; // поменяешь потом

async function sendMessage() {
  const text = document.getElementById("text").value;

  const res = await fetch(API + "/send", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text })
  });

  const data = await res.json();

  if (!data.ok) {
    startTimer(data.retryAfter);
    alert("Wait before next message");
    return;
  }

  document.getElementById("text").value = "";
  loadMessages();
}

function startTimer(seconds) {
  const timer = document.getElementById("timer");
  const btn = document.getElementById("sendBtn");

  btn.disabled = true;

  const interval = setInterval(() => {
    if (seconds <= 0) {
      clearInterval(interval);
      btn.disabled = false;
      timer.innerText = "";
      return;
    }

    timer.innerText = "Next message in: " + seconds + "s";
    seconds--;
  }, 1000);
}

async function loadMessages() {
  const res = await fetch(API + "/messages");
  const data = await res.json();

  const container = document.getElementById("messages");
  container.innerHTML = "";

  data.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg";
    div.innerText = m.text;
    container.appendChild(div);
  });
}

loadMessages();
</script>

</body>
</html>
